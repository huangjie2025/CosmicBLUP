name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libeigen3-dev zlib1g-dev libzstd-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja eigen zstd libomp
      - name: Configure
        run: cmake --preset release -DCMAKE_DISABLE_FIND_PACKAGE_BLAS=ON -DCMAKE_DISABLE_FIND_PACKAGE_LAPACK=ON
      - name: Build
        run: cmake --build --preset release --parallel 2
      - name: Test
        run: ctest --preset release
